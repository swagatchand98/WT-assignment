<!DOCTYPE html>
<html>
<head>
    <title>Form Toggle</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
            margin-top: 50px;
        }

        .container {
            width: 320px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .tabs button {
            padding: 10px;
            width: 48%;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .tabs button:hover {
            background-color: #ddd;
        }

        input {
            margin: 8px;
            padding: 8px;
            width: 90%;
        }

        input[type="submit"] {
            background-color: #28a745;
            color: white;
            border: none;
        }

        .form-section {
            display: none;
        }

        .active {
            display: block;
        }
    </style>

    <script>
        let registeredUser = "";
        let registeredPass = "";

        function showForm(formType) {
            document.getElementById("registerForm").classList.remove("active");
            document.getElementById("loginForm").classList.remove("active");

            document.getElementById(formType).classList.add("active");
        }

        function validateRegister() {
            let name = document.getElementById("name").value.trim();
            let pass = document.getElementById("pass").value.trim();

            if (name === "" || pass === "") {
                alert("All fields are required!");
                return false;
            }

            if (pass.length < 6) {
                alert("Password must be at least 6 characters!");
                return false;
            }

            registeredUser = name;
            registeredPass = pass;

            alert("Registration Successful!");
            return true;
        }

        function validateLogin() {
            let user = document.getElementById("user").value.trim();
            let pass = document.getElementById("loginpass").value.trim();

            if (user === "" || pass === "") {
                alert("Fill all login fields!");
                return false;
            }

            if (user !== registeredUser) {
                alert("User not registered!");
                return false;
            }

            if (pass !== registeredPass) {
                alert("Incorrect Password!");
                return false;
            }

            alert("Login Successful!");
            return true;
        }

        window.onload = function() {
            showForm("registerForm");
        };
    </script>

</head>

<body>

<div class="container">

    <div class="tabs">
        <button onclick="showForm('registerForm')">Registration</button>
        <button onclick="showForm('loginForm')">Login</button>
    </div>

    <div id="registerForm" class="form-section">
        <h2>Registration</h2>
        <form onsubmit="return validateRegister()">
            <input type="text" id="name" placeholder="Enter Username"><br>
            <input type="password" id="pass" placeholder="Enter Password"><br>
            <input type="submit" value="Register">
        </form>
    </div>

    <div id="loginForm" class="form-section">
        <h2>Login</h2>
        <form onsubmit="return validateLogin()">
            <input type="text" id="user" placeholder="Enter Username"><br>
            <input type="password" id="loginpass" placeholder="Enter Password"><br>
            <input type="submit" value="Login">
        </form>
    </div>

</div>

</body>
</html>
