<!DOCTYPE html>
<html>
<head>
    <title>SimpleShop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1, h2 {
            text-align: center;
            color: darkblue;
        }

        nav {
            text-align: center;
            margin-bottom: 20px;
        }

        nav button {
            margin: 10px;
            padding: 10px 15px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        nav button:hover {
            background: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        img {
            width: 100px;
            border-radius: 8px;
        }

        .page {
            display: none;
        }

        .active {
            display: block;
        }

        button.add, button.remove {
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            margin: 0 2px;
        }

        button.remove {
            background: red;
        }

        button.add:hover {
            background: darkgreen;
        }

        button.remove:hover {
            background: darkred;
        }

        .product-count {
            font-weight: bold;
            color: darkred;
            margin: 0 5px;
        }

        button.clear {
            background: red;
            color: white;
            padding: 5px 10px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button.clear:hover {
            background: darkred;
        }

        #cartItems li {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        #cartItems img {
            width: 50px;
            margin-right: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">

<h1>🛒 SimpleShop</h1>

<nav>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('products')">Products</button>
    <button onclick="showPage('cart')">Cart</button>
    <button onclick="showPage('checkout')">Checkout</button>
</nav>

<div id="home" class="page active">
    <p style="color: green; text-align:center;">
        Welcome to your one-stop shop for quality products!
    </p>
</div>

<div id="products" class="page">
    <h2>Products</h2>

    <table>
        <tr>
            <th>Product</th>
            <th>Image</th>
            <th>Price</th>
            <th>Action</th>
        </tr>

        <tr>
            <td>Laptop</td>
            <td>
                <img src="https://static.vecteezy.com/system/resources/previews/056/704/992/non_2x/laptop-technology-showcase-modern-workspace-product-photography-minimalist-environment-angle-view-innovation-exploration-free-png.png">
            </td>
            <td>₹60,000</td>
            <td>
                <button class="remove" onclick="updateCart('Laptop', -1, 60000, this)">−</button>
                <span class="product-count">0</span>
                <button class="add" onclick="updateCart('Laptop', 1, 60000, this)">+</button>
            </td>
        </tr>

        <tr>
            <td>Headphones</td>
            <td>
                <img src="https://tse3.mm.bing.net/th/id/OIP.RSC3hISnMBMNdc51vlVQdwHaHa?pid=Api&P=0&h=180">
            </td>
            <td>₹3,000</td>
            <td>
                <button class="remove" onclick="updateCart('Headphones', -1, 3000, this)">−</button>
                <span class="product-count">0</span>
                <button class="add" onclick="updateCart('Headphones', 1, 3000, this)">+</button>
            </td>
        </tr>

        <tr>
            <td>Smartphone</td>
            <td>
                <img src="https://tse3.mm.bing.net/th/id/OIP.T6tm0-FJcvhhHpXtl_I9gQHaHk?pid=Api&P=0&h=180">
            </td>
            <td>₹20,000</td>
            <td>
                <button class="remove" onclick="updateCart('Smartphone', -1, 20000, this)">−</button>
                <span class="product-count">0</span>
                <button class="add" onclick="updateCart('Smartphone', 1, 20000, this)">+</button>
            </td>
        </tr>

    </table>
</div>

<div id="cart" class="page">
    <h2>Your Cart</h2>

    <ul id="cartItems"></ul>

    <p><b>Total: ₹<span id="total">0</span></b></p>

    <button class="clear" onclick="clearCart()">Clear Cart</button>
</div>

<div id="checkout" class="page">
    <h2>Checkout</h2>

    <form>
        Name:<br>
        <input type="text" required><br><br>

        Address:<br>
        <textarea rows="4"></textarea><br><br>

        Payment:<br>
        <input type="radio" name="pay"> COD
        <input type="radio" name="pay"> Card<br><br>

        <input type="submit" value="Place Order">
    </form>
</div>

</div>

<script>
let total = 0;
let productCounts = {};
let productImages = {
    "Laptop": "https://static.vecteezy.com/system/resources/previews/056/704/992/non_2x/laptop-technology-showcase-modern-workspace-product-photography-minimalist-environment-angle-view-innovation-exploration-free-png.png",
    "Headphones": "https://tse3.mm.bing.net/th/id/OIP.RSC3hISnMBMNdc51vlVQdwHaHa?pid=Api&P=0&h=180",
    "Smartphone": "https://tse3.mm.bing.net/th/id/OIP.T6tm0-FJcvhhHpXtl_I9gQHaHk?pid=Api&P=0&h=180"
};

function showPage(pageId) {
    let pages = document.querySelectorAll('.page');
    pages.forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

function updateCart(name, change, price, btn) {
    if(!productCounts[name]) productCounts[name] = 0;

    let newCount = productCounts[name] + change;
    if(newCount < 0) newCount = 0;

    total += (newCount - productCounts[name]) * price;
    productCounts[name] = newCount;

    btn.parentElement.querySelector('.product-count').innerText = newCount;

    let cart = document.getElementById('cartItems');
    cart.innerHTML = ''; // clear
    for (let prod in productCounts) {
        if(productCounts[prod] > 0){
            cart.innerHTML += `
                <li>
                    <img src="${productImages[prod]}" alt="${prod}">
                    ${prod} x ${productCounts[prod]} - ₹${productCounts[prod]*getPrice(prod)}
                </li>
            `;
        }
    }

    document.getElementById('total').innerText = total;
}

function getPrice(name) {
    if(name === "Laptop") return 60000;
    if(name === "Headphones") return 3000;
    if(name === "Smartphone") return 20000;
    return 0;
}

function clearCart() {
    productCounts = {};
    total = 0;
    document.getElementById('cartItems').innerHTML = '';
    document.getElementById('total').innerText = total;
    document.querySelectorAll('.product-count').forEach(span => span.innerText = 0);
}
</script>

</body>
</html>
