<!DOCTYPE html>
<html>
<head>
<title>Scientific Calculator</title>

<style>
#calc {
    border: 2px solid black;
    display: inline-block;
    padding: 10px;
}
</style>

</head>

<body align="center">

<h1>Scientific Calculator</h1>

<div id="calc">
<input type="text" id="display" readonly>

<br><br>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">/</button>

<br><br>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">*</button>

<br><br>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">-</button>

<br><br>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="square()">x²</button>
<button onclick="append('+')">+</button>

<br><br>

<button onclick="sqrt()">√</button>
<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>

<br><br>

<button onclick="clearDisplay()">C</button>
<button onclick="calculate()">=</button>

</div>

<script>
function append(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    try {
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    } catch {
        alert("Invalid");
    }
}

function sqrt() {
    let val = document.getElementById("display").value;
    document.getElementById("display").value = Math.sqrt(val);
}

function square() {
    let val = document.getElementById("display").value;
    document.getElementById("display").value = val * val;
}

function sin() {
    let val = document.getElementById("display").value;
    document.getElementById("display").value = Math.sin(val);
}

function cos() {
    let val = document.getElementById("display").value;
    document.getElementById("display").value = Math.cos(val);
}

function tan() {
    let val = document.getElementById("display").value;
    document.getElementById("display").value = Math.tan(val);
}
</script>

</body>
</html>
