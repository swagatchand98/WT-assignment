<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education</title>

<link rel="stylesheet" href="style.css">

<style>
h2 {
    color: darkgreen;
    text-align: center;
}
hr {
    border: 2px solid gray;
}
</style>

</head>

<body>

<h1 id="eduTitle" style="color:darkred;">Education Details</h1>

<hr><br>

<!-- BUTTON EVENT -->
<button id="highlightBtn">Highlight Table</button>

<br><br>

<table id="eduTable" border="3">
    <tr>
        <th>Qualification</th>
        <th>Institution</th>
    </tr>

    <tr>
        <td>B.Tech</td>
        <td>Jain University</td>
    </tr>

    <tr>
        <td>12th</td>
        <td>Godavari Mahavidyalaya</td>
    </tr>

    <tr>
        <td>10th</td>
        <td>Oxford International School</td>
    </tr>
</table>

<br><hr><br>

<a href="index.html">Back to Home</a>

<script>

// 🔷 PAGE LOAD EVENT
document.addEventListener("DOMContentLoaded", function() {
    console.log("Education Page Loaded");
});

// 🔷 CLICK EVENT (Highlight Table)
document.getElementById("highlightBtn").addEventListener("click", function() {
    let rows = document.querySelectorAll("#eduTable tr");

    rows.forEach(row => {
        row.style.backgroundColor = "lightyellow";
    });
});

// 🔷 HOVER EVENT (Row Highlight)
let rows = document.querySelectorAll("#eduTable tr");

rows.forEach(row => {
    row.addEventListener("mouseover", function() {
        this.style.backgroundColor = "lightblue";
    });

    row.addEventListener("mouseout", function() {
        this.style.backgroundColor = "";
    });
});

// 🔷 DOUBLE CLICK EVENT (Change Heading)
document.getElementById("eduTitle").addEventListener("dblclick", function() {
    this.innerHTML = "My Education Journey";
});

// 🔷 KEYBOARD EVENT
document.addEventListener("keydown", function(event) {
    if (event.key === "h") {
        alert("You pressed H for Highlight!");
    }
});

</script>

</body>
</html>
